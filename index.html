<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padova Notte — eventi & serate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --sfondo:#0d0d0d;--superficie:#181818;--bordo:#2a2a2a;
      --testo:#f0ede8;--testo-muto:#888480;--accento:#ff6b35;
      --altezza-header:64px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background-color:var(--sfondo);color:var(--testo);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;overflow:hidden;height:100vh;}
    header{height:var(--altezza-header);padding:0 1.5rem;border-bottom:1px solid var(--bordo);display:flex;align-items:center;justify-content:space-between;background-color:var(--sfondo);position:relative;z-index:100;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--testo);text-decoration:none;}
    .logo span{color:var(--accento);}
    .contatore{font-size:.8rem;color:var(--testo-muto);}
    .contatore strong{color:var(--accento);font-weight:600;}
    .layout{display:flex;height:calc(100vh - var(--altezza-header));}
    .pannello-lista{width:420px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bordo);padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:.875rem;}
    .pannello-lista::-webkit-scrollbar{width:4px;}
    .pannello-lista::-webkit-scrollbar-thumb{background:var(--bordo);border-radius:2px;}
    .lista-header{margin-bottom:.5rem;}
    .lista-header h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;letter-spacing:.03em;}
    .lista-header h1 em{color:var(--accento);font-style:normal;}
    .lista-header p{font-size:.8rem;color:var(--testo-muto);margin-top:.25rem;}
    .stato-caricamento{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:3rem 1rem;color:var(--testo-muto);font-size:.9rem;text-align:center;}
    .spinner{width:32px;height:32px;border:3px solid var(--bordo);border-top-color:var(--accento);border-radius:50%;animation:gira .8s linear infinite;}
    @keyframes gira{to{transform:rotate(360deg);}}
    .stato-errore{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:10px;padding:1.25rem;font-size:.85rem;color:#f87171;line-height:1.5;}
    .stato-errore strong{display:block;margin-bottom:.5rem;}
    .stato-errore code{display:block;background:#0d0d0d;padding:.5rem .75rem;border-radius:6px;font-size:.75rem;color:var(--testo-muto);margin-top:.5rem;word-break:break-all;}
    .carta-evento{background-color:var(--superficie);border:1px solid var(--bordo);border-radius:10px;padding:1rem 1.125rem;display:flex;gap:1rem;align-items:flex-start;cursor:pointer;transition:border-color .2s ease,background-color .2s ease;}
    .carta-evento:hover{border-color:var(--accento);background-color:#1f1a16;}
    .carta-evento.attiva{border-color:var(--accento);background-color:#1f1a16;box-shadow:0 0 0 1px var(--accento);}
    .data-blocco{text-align:center;min-width:44px;flex-shrink:0;}
    .data-giorno{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--accento);line-height:1;}
    .data-mese{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--testo-muto);line-height:1.2;}
    .carta-corpo{flex:1;min-width:0;}
    .carta-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.375rem;}
    .nome-evento{font-size:.9rem;font-weight:600;color:var(--testo);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .badge{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:.2rem .55rem;border-radius:999px;flex-shrink:0;}
    .badge-discoteca{background:#1a0a2e;color:#a78bfa;}
    .badge-festa{background:#1a1500;color:#fbbf24;}
    .badge-aperitivo{background:#0a1f0a;color:#4ade80;}
    .badge-concerto{background:#1a0a0a;color:#f87171;}
    .carta-meta{display:flex;flex-wrap:wrap;gap:.5rem 1rem;font-size:.78rem;color:var(--testo-muto);}
    .meta-item{display:flex;align-items:center;gap:.3rem;}
    .meta-item svg{width:12px;height:12px;color:var(--accento);flex-shrink:0;}
    .pannello-mappa{flex:1;position:relative;}
    #mappa{width:100%;height:100%;}
    .leaflet-popup-content-wrapper{background-color:var(--superficie)!important;color:var(--testo)!important;border:1px solid var(--bordo)!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important;}
    .leaflet-popup-tip{background-color:var(--superficie)!important;}
    .leaflet-popup-content{margin:12px 16px!important;font-family:'DM Sans',sans-serif!important;}
    .popup-titolo{font-weight:600;font-size:.9rem;margin-bottom:4px;color:#f0ede8;}
    .popup-dettaglio{font-size:.78rem;color:#888480;}
    @media(max-width:700px){
      body{overflow:auto;height:auto;}
      .layout{flex-direction:column;height:auto;}
      .pannello-lista{width:100%;border-right:none;border-bottom:1px solid var(--bordo);overflow-y:visible;}
      .pannello-mappa{height:320px;flex-shrink:0;order:-1;}
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">Padova<span>Notte</span></a>
    <span class="contatore"><strong id="num-eventi">—</strong> eventi in programma</span>
  </header>
  <div class="layout">
    <aside class="pannello-lista" id="pannello-lista">
      <div class="lista-header">
        <h1>Prossimi <em>eventi</em></h1>
        <p>Padova &amp; dintorni — clicca per vedere sulla mappa</p>
      </div>
      <div class="stato-caricamento" id="stato">
        <div class="spinner"></div>
        <span>Caricamento eventi…</span>
      </div>
    </aside>
    <div class="pannello-mappa">
      <div id="mappa"></div>
    </div>
  </div>
  <script>
    const URL_FOGLIO = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdQPP9v8aTb1ew8liKR2i2LkVJeMyBofGD1elxeP7w19U6XCvCSvCDOcrDYnyJgtDO_2pcp3YEAURh/pub?gid=0&single=true&output=csv';

    const mappa = L.map('mappa').setView([45.42,11.88],11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(mappa);

    let markers=[],attivo=null;

    function creaIcona(a){
      const s=a?18:13;
      return L.divIcon({className:'',html:`<div style="width:${s}px;height:${s}px;background:#ff6b35;border:2px solid ${a?'#fff':'#ff6b35'};border-radius:50%;box-shadow:0 0 ${a?10:4}px rgba(255,107,53,0.7);"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]});
    }

    function badgeLabel(t){return{discoteca:'Disco',festa:'Festa',aperitivo:'Aperitivo',concerto:'Concerto'}[t]||t;}

    /*
      parseCoord: converte una stringa coordinata in numero float.
      Gestisce sia il punto (45.527) che la virgola italiana (45,527).
    */
    function parseCoord(val){
      if(!val) return NaN;
      return parseFloat(String(val).replace(',','.'));
    }

    function creaCarta(ev,i){
      const ico=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
      const pin=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
      const parti=(ev.mese_anno||'').split(' ');
      return `
        <div class="carta-evento" data-id="${i}" onclick="selezionaEvento(${i})">
          <div class="data-blocco">
            <div class="data-giorno">${ev.giorno||'?'}</div>
            <div class="data-mese">${(parti[0]||'').substring(0,3)}<br>${parti[1]||''}</div>
          </div>
          <div class="carta-corpo">
            <div class="carta-top">
              <span class="nome-evento">${ev.nome||'Evento'}</span>
              <span class="badge badge-${ev.tipo||'festa'}">${badgeLabel(ev.tipo)}</span>
            </div>
            <div class="carta-meta">
              <span class="meta-item">${ico}${ev.orario||'—'}</span>
              <span class="meta-item">${pin}${ev.zona||ev.luogo||'—'}</span>
            </div>
          </div>
        </div>`;
    }

    Papa.parse(URL_FOGLIO,{
      download:true,header:true,skipEmptyLines:true,
      complete:function(r){
        const eventi=r.data;
        document.getElementById('stato').remove();
        document.getElementById('num-eventi').textContent=eventi.length;
        eventi.forEach((ev,i)=>{
          document.getElementById('pannello-lista').insertAdjacentHTML('beforeend',creaCarta(ev,i));
          const lat=parseCoord(ev.lat);
          const lng=parseCoord(ev.lng);
          if(!isNaN(lat)&&!isNaN(lng)){
            const m=L.marker([lat,lng],{icon:creaIcona(false)}).addTo(mappa);
            m.bindPopup(`<div class="popup-titolo">${ev.nome}</div><div class="popup-dettaglio">🕐 ${ev.orario}</div><div class="popup-dettaglio">📍 ${ev.luogo||ev.zona}</div>`);
            m.on('click',()=>evidenziaCarta(i));
            markers[i]=m;
          }
        });
      },
      error:function(){
        document.getElementById('stato').innerHTML=`<div class="stato-errore"><strong>⚠️ Impossibile caricare gli eventi</strong>Assicurati di aver pubblicato il foglio come CSV.<code>${URL_FOGLIO}</code></div>`;
      }
    });

    function selezionaEvento(i){
      if(attivo!==null){document.querySelector(`.carta-evento[data-id="${attivo}"]`).classList.remove('attiva');if(markers[attivo])markers[attivo].setIcon(creaIcona(false));}
      attivo=i;
      document.querySelector(`.carta-evento[data-id="${i}"]`).classList.add('attiva');
      if(markers[i]){markers[i].setIcon(creaIcona(true));mappa.panTo(markers[i].getLatLng());markers[i].openPopup();}
    }
    function evidenziaCarta(i){
      if(attivo!==null){document.querySelector(`.carta-evento[data-id="${attivo}"]`).classList.remove('attiva');if(markers[attivo])markers[attivo].setIcon(creaIcona(false));}
      attivo=i;
      const c=document.querySelector(`.carta-evento[data-id="${i}"]`);
      if(c){c.classList.add('attiva');c.scrollIntoView({behavior:'smooth',block:'nearest'});}
      if(markers[i])markers[i].setIcon(creaIcona(true));
    }
  </script>
</body>
</html>
