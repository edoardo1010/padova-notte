
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padova Notte — eventi & serate</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Unbounded: display bold per il logo | DM Sans: testo leggibile -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 
  <style>
    /* ── VARIABILI ── */
    :root {
      --sfondo:      #06030f;   /* viola-nero profondo — atmosfera notturna */
      --superficie:  #100c1e;
      --bordo:       #1f1a35;
      --testo:       #f0eeff;
      --testo-muto:  #7c7898;
      --accento:     #c084fc;   /* viola elettrico — colore firma del sito */
 
      /* colori per tipo evento */
      --col-discoteca: #c084fc;
      --col-aperitivo: #34d399;
      --col-concerto:  #f87171;
      --col-sagra:     #fbbf24;
      --col-festa:     #60a5fa;
 
      /* colori per target */
      --col-giovani:   #c084fc;
      --col-over35:    #60a5fa;
      --col-famiglie:  #fbbf24;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--sfondo);
      color: var(--testo);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
    }
 
    /* ── HEADER FLOTTANTE ── */
    /*
      position: fixed + backdrop-filter: blur → effetto vetro smerigliato
      che galleggia sopra la mappa. È il "pezzo firma" del design.
    */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 0.875rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: rgba(6, 3, 15, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.15);
      flex-wrap: wrap;
    }
 
    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--testo);
      text-decoration: none;
      white-space: nowrap;
    }
    .logo span { color: var(--accento); }
 
    /* ── BARRA FILTRI ── */
    .filtri {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.25rem;
      flex: 1;
    }
 
    .gruppo-filtri {
      display: flex;
      gap: 0.375rem;
      align-items: center;
    }
 
    /* Divisore verticale tra i due gruppi */
    .filtri-sep {
      width: 1px;
      height: 20px;
      background: var(--bordo);
      flex-shrink: 0;
    }
 
    /*
      I filtri sono bottoni con bordo colorato.
      Quando attivi (.attivo) il bordo diventa pieno e lo sfondo si colora.
    */
    .filtro-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, opacity 0.18s ease;
      color: var(--testo-muto);
      border-color: var(--bordo);
    }
 
    .filtro-btn:hover { opacity: 0.85; }
 
    /* Quando il bottone è attivo mostra il colore pieno */
    .filtro-btn.attivo {
      color: #000;
      border-color: transparent;
    }
 
    /* Colori specifici per ogni filtro */
    .filtro-btn[data-tipo="tutti"].attivo,
    .filtro-btn[data-target="tutti"].attivo      { background: var(--testo); color: #000; }
    .filtro-btn[data-tipo="discoteca"].attivo    { background: var(--col-discoteca); }
    .filtro-btn[data-tipo="aperitivo"].attivo    { background: var(--col-aperitivo); }
    .filtro-btn[data-tipo="concerto"].attivo     { background: var(--col-concerto); }
    .filtro-btn[data-tipo="sagra"].attivo        { background: var(--col-sagra); }
    .filtro-btn[data-tipo="festa"].attivo        { background: var(--col-festa); }
    .filtro-btn[data-target="18-35"].attivo      { background: var(--col-giovani); }
    .filtro-btn[data-target="over35"].attivo     { background: var(--col-over35); }
    .filtro-btn[data-target="famiglie"].attivo   { background: var(--col-famiglie); }
 
    .contatore-eventi {
      font-size: 0.75rem;
      color: var(--testo-muto);
      white-space: nowrap;
      margin-left: auto;
    }
    .contatore-eventi strong { color: var(--accento); }
 
    /* ── MAPPA ── */
    #mappa {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
 
    /* ── POPUP EVENTO ── */
    /*
      Invece del popup Leaflet standard, usiamo un pannello personalizzato
      che appare in basso a sinistra. Molto più controllabile visivamente.
    */
    #popup-evento {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 999;
      width: 320px;
      background: rgba(16, 12, 30, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--bordo);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      display: none; /* nascosto di default */
      animation: slideUp 0.2s ease;
    }
 
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* Striscia colorata in cima al popup — cambia colore per tipo */
    .popup-striscia {
      height: 4px;
      width: 100%;
    }
 
    .popup-corpo {
      padding: 1.25rem;
    }
 
    .popup-badges {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
 
    .popup-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
 
    .popup-nome {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: var(--testo);
    }
 
    .popup-dettagli {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
 
    .popup-riga {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      font-size: 0.82rem;
      color: var(--testo-muto);
      line-height: 1.4;
    }
 
    .popup-riga svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }
 
    .popup-riga span { color: var(--testo); }
 
    .popup-chiudi {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(255,255,255,0.07);
      border: none;
      color: var(--testo-muto);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .popup-chiudi:hover { background: rgba(255,255,255,0.15); color: var(--testo); }
 
    /* Messaggio "nessun evento" con filtri attivi */
    #nessun-risultato {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(16,12,30,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--bordo);
      border-radius: 999px;
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      color: var(--testo-muto);
      display: none;
      white-space: nowrap;
    }
 
    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 0.75rem 1rem; gap: 0.75rem; }
      .logo { font-size: 0.9rem; }
      .filtri-sep { display: none; }
      #popup-evento { width: calc(100vw - 2rem); left: 1rem; right: 1rem; bottom: 1rem; }
      .contatore-eventi { display: none; }
    }
  </style>
</head>
<body>
 
  <!-- MAPPA (va prima nel DOM ma sotto header via z-index) -->
  <div id="mappa"></div>
 
  <!-- HEADER FLOTTANTE -->
  <header>
    <a href="#" class="logo">PADOVA<span>NOTTE</span></a>
 
    <div class="filtri">
 
      <!-- GRUPPO 1: tipo evento -->
      <div class="gruppo-filtri" id="filtri-tipo">
        <button class="filtro-btn attivo" data-tipo="tutti">Tutti</button>
        <button class="filtro-btn" data-tipo="discoteca">Disco</button>
        <button class="filtro-btn" data-tipo="aperitivo">Aperitivo</button>
        <button class="filtro-btn" data-tipo="concerto">Concerto</button>
        <button class="filtro-btn" data-tipo="sagra">Sagra</button>
        <button class="filtro-btn" data-tipo="festa">Festa</button>
      </div>
 
      <div class="filtri-sep"></div>
 
      <!-- GRUPPO 2: target età -->
      <div class="gruppo-filtri" id="filtri-target">
        <button class="filtro-btn attivo" data-target="tutti">Tutti</button>
        <button class="filtro-btn" data-target="18-35">18–35</button>
        <button class="filtro-btn" data-target="over35">Over 35</button>
        <button class="filtro-btn" data-target="famiglie">Famiglie</button>
      </div>
 
    </div>
 
    <span class="contatore-eventi"><strong id="num-visibili">0</strong> eventi</span>
  </header>
 
  <!-- POPUP EVENTO PERSONALIZZATO -->
  <div id="popup-evento">
    <div class="popup-striscia" id="popup-striscia"></div>
    <div class="popup-corpo">
      <button class="popup-chiudi" onclick="chiudiPopup()">✕</button>
      <div class="popup-badges" id="popup-badges"></div>
      <div class="popup-nome" id="popup-nome"></div>
      <div class="popup-dettagli" id="popup-dettagli"></div>
    </div>
  </div>
 
  <!-- Messaggio nessun risultato -->
  <div id="nessun-risultato">Nessun evento con i filtri selezionati</div>
 
  <script>
    // ══════════════════════════════════════════════════════════════
    // 📋 EVENTI — aggiungi qui i tuoi eventi
    //
    // Campi obbligatori:
    //   nome     → nome dell'evento
    //   giorno   → numero del giorno (es. 15)
    //   mese     → nome del mese (es. "Giugno")
    //   anno     → anno (es. 2026)
    //   orario   → orario di apertura/chiusura (es. "23:00 – 05:00")
    //   location → nome del locale / luogo
    //   indirizzo→ via, città
    //   prezzo   → es. "€10 ingresso" oppure "Gratuito"
    //   tipo     → "discoteca" | "aperitivo" | "concerto" | "sagra" | "festa"
    //   target   → "18-35" | "over35" | "famiglie"
    //   lat      → latitudine (usa maps.google.com: tasto destro → "Cosa c'è qui?")
    //   lng      → longitudine
    //
    // Campi opzionali:
    //   note     → info extra (dress code, prenotazione, ecc.)
    // ══════════════════════════════════════════════════════════════
    const EVENTI = [
      {
        nome:      "Saturday Night Fever — Opening Estate",
        giorno:    10,
        mese:      "Maggio",
        anno:      2026,
        orario:    "23:00 – 05:00",
        location:  "Villa Bonin",
        indirizzo: "Via Vicentina 48, Longare (VI)",
        prezzo:    "€15 ingresso / €5 consumazione",
        tipo:      "discoteca",
        target:    "18-35",
        lat:       45.527958,
        lng:       11.503584,
        note:      "Dress code: no sportswear"
      },
      {
        nome:      "Club Tropicana Night — DJ Set",
        giorno:    24,
        mese:      "Maggio",
        anno:      2026,
        orario:    "23:30 – 06:00",
        location:  "Veneto Club",
        indirizzo: "Via Roma 10, Padova",
        prezzo:    "€10 ingresso",
        tipo:      "discoteca",
        target:    "18-35",
        lat:       45.4064,
        lng:       11.8768,
        note:      ""
      },
      {
        nome:      "Spritz & Sunset — Aperitivo sul Brenta",
        giorno:    17,
        mese:      "Maggio",
        anno:      2026,
        orario:    "18:00 – 22:00",
        location:  "Ristorante Il Mulino",
        indirizzo: "Via Brenta 5, Stra (VE)",
        prezzo:    "€12 consumazione inclusa",
        tipo:      "aperitivo",
        target:    "18-35",
        lat:       45.4083,
        lng:       11.9333,
        note:      ""
      },
      {
        nome:      "Hip-Hop Night — Padova Underground",
        giorno:    28,
        mese:      "Maggio",
        anno:      2026,
        orario:    "23:00 – 05:00",
        location:  "Playground Club",
        indirizzo: "Via Venezia 32, Padova",
        prezzo:    "€8 ingresso",
        tipo:      "discoteca",
        target:    "18-35",
        lat:       45.3901,
        lng:       11.8712,
        note:      ""
      },
      {
        nome:      "Sagra di San Giacomo — musica live",
        giorno:    31,
        mese:      "Maggio",
        anno:      2026,
        orario:    "17:00 – 00:00",
        location:  "Piazza del Comune",
        indirizzo: "Piazza del Comune, Campodarsego (PD)",
        prezzo:    "Gratuito",
        tipo:      "sagra",
        target:    "famiglie",
        lat:       45.5108,
        lng:       11.9208,
        note:      "Bancarelle, giostre e musica folk"
      },
      {
        nome:      "Beach Party — Opening Jesolo",
        giorno:    14,
        mese:      "Giugno",
        anno:      2026,
        orario:    "22:00 – 06:00",
        location:  "Lido di Jesolo",
        indirizzo: "Piazza Mazzini, Jesolo (VE)",
        prezzo:    "€20 ingresso + consumazione",
        tipo:      "festa",
        target:    "18-35",
        lat:       45.5073,
        lng:       12.6440,
        note:      ""
      },
      {
        nome:      "Aperitivo in Vigna — Estate 2026",
        giorno:    7,
        mese:      "Giugno",
        anno:      2026,
        orario:    "17:30 – 21:00",
        location:  "Cantina Euganea",
        indirizzo: "Via dei Colli 18, Vo' Euganeo (PD)",
        prezzo:    "€15 degustazione inclusa",
        tipo:      "aperitivo",
        target:    "over35",
        lat:       45.3267,
        lng:       11.6756,
        note:      "Vini locali e prodotti tipici"
      }
    ];
 
    // ══════════════════════════════════════════════════════════════
    // CONFIGURAZIONE COLORI — non modificare
    // ══════════════════════════════════════════════════════════════
    const COLORI_TIPO = {
      discoteca: '#c084fc',
      aperitivo: '#34d399',
      concerto:  '#f87171',
      sagra:     '#fbbf24',
      festa:     '#60a5fa'
    };
 
    const LABEL_TIPO = {
      discoteca: 'Discoteca',
      aperitivo: 'Aperitivo',
      concerto:  'Concerto',
      sagra:     'Sagra',
      festa:     'Festa'
    };
 
    const COLORI_TARGET = {
      '18-35':    '#c084fc',
      'over35':   '#60a5fa',
      'famiglie': '#fbbf24'
    };
 
    const LABEL_TARGET = {
      '18-35':    '18–35',
      'over35':   'Over 35',
      'famiglie': 'Famiglie'
    };
 
    // ── INIZIALIZZA MAPPA ──────────────────────────────────────────
    const mappa = L.map('mappa', { zoomControl: false }).setView([45.45, 11.90], 10);
 
    // Tile scuro Carto
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      maxZoom: 19
    }).addTo(mappa);
 
    // Zoom in basso a destra (non coperto dall'header)
    L.control.zoom({ position: 'bottomright' }).addTo(mappa);
 
    // ── MARKERS ───────────────────────────────────────────────────
    function creaIcona(tipo, attivo = false) {
      const col = COLORI_TIPO[tipo] || '#888';
      const size = attivo ? 20 : 14;
      const glow = attivo ? `box-shadow:0 0 12px 3px ${col}88;` : '';
      return L.divIcon({
        className: '',
        html: `<div style="
          width:${size}px;height:${size}px;
          background:${col};
          border-radius:50%;
          border:2px solid ${attivo ? '#fff' : col};
          ${glow}
          transition:all .2s;
        "></div>`,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2]
      });
    }
 
    // Crea tutti i marker
    const markers = EVENTI.map((ev, i) => {
      const m = L.marker([ev.lat, ev.lng], { icon: creaIcona(ev.tipo) });
      m.on('click', () => apriPopup(ev, i, m));
      m.addTo(mappa);
      return { marker: m, evento: ev, indice: i };
    });
 
    // ── POPUP PERSONALIZZATO ──────────────────────────────────────
    let markerAttivo = null;
 
    function apriPopup(ev, i, marker) {
      // Reset marker precedente
      if (markerAttivo) {
        const prev = markers.find(m => m.marker === markerAttivo);
        if (prev) prev.marker.setIcon(creaIcona(prev.evento.tipo, false));
      }
      // Evidenzia marker cliccato
      marker.setIcon(creaIcona(ev.tipo, true));
      markerAttivo = marker;
 
      const col = COLORI_TIPO[ev.tipo] || '#888';
      const colTarget = COLORI_TARGET[ev.target] || '#888';
 
      // Striscia colorata
      document.getElementById('popup-striscia').style.background = col;
 
      // Badges
      document.getElementById('popup-badges').innerHTML = `
        <span class="popup-badge" style="background:${col}22;color:${col}">${LABEL_TIPO[ev.tipo] || ev.tipo}</span>
        <span class="popup-badge" style="background:${colTarget}22;color:${colTarget}">${LABEL_TARGET[ev.target] || ev.target}</span>
      `;
 
      // Nome
      document.getElementById('popup-nome').textContent = ev.nome;
 
      // Icone SVG
      const icoData  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:${col}"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
      const icoOra   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:${col}"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
      const icoPin   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:${col}"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
      const icoPrezzo= `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:${col}"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;
 
      // Dettagli
      let html = `
        <div class="popup-riga">${icoData}<span>${ev.giorno} ${ev.mese} ${ev.anno}</span></div>
        <div class="popup-riga">${icoOra}<span>${ev.orario}</span></div>
        <div class="popup-riga">${icoPin}<span>${ev.location} — ${ev.indirizzo}</span></div>
        <div class="popup-riga">${icoPrezzo}<span>${ev.prezzo}</span></div>
      `;
      if (ev.note) {
        const icoInfo = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:${col}"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
        html += `<div class="popup-riga">${icoInfo}<span>${ev.note}</span></div>`;
      }
      document.getElementById('popup-dettagli').innerHTML = html;
 
      // Mostra popup
      document.getElementById('popup-evento').style.display = 'block';
 
      // Centra mappa sull'evento (con offset per non finire sotto header)
      mappa.panTo([ev.lat, ev.lng]);
    }
 
    function chiudiPopup() {
      document.getElementById('popup-evento').style.display = 'none';
      if (markerAttivo) {
        const prev = markers.find(m => m.marker === markerAttivo);
        if (prev) prev.marker.setIcon(creaIcona(prev.evento.tipo, false));
        markerAttivo = null;
      }
    }
 
    // Chiudi popup cliccando sulla mappa
    mappa.on('click', chiudiPopup);
 
    // ── FILTRI ────────────────────────────────────────────────────
    let filtroTipo   = 'tutti';
    let filtroTarget = 'tutti';
 
    function applicaFiltri() {
      let visibili = 0;
 
      markers.forEach(({ marker, evento }) => {
        const matchTipo   = filtroTipo   === 'tutti' || evento.tipo   === filtroTipo;
        const matchTarget = filtroTarget === 'tutti' || evento.target === filtroTarget;
 
        if (matchTipo && matchTarget) {
          marker.addTo(mappa);
          visibili++;
        } else {
          mappa.removeLayer(marker);
        }
      });
 
      document.getElementById('num-visibili').textContent = visibili;
      document.getElementById('nessun-risultato').style.display = visibili === 0 ? 'block' : 'none';
 
      // Se il popup aperto appartiene a un evento ora nascosto, chiudilo
      if (markerAttivo) {
        const prev = markers.find(m => m.marker === markerAttivo);
        if (prev) {
          const matchTipo   = filtroTipo   === 'tutti' || prev.evento.tipo   === filtroTipo;
          const matchTarget = filtroTarget === 'tutti' || prev.evento.target === filtroTarget;
          if (!matchTipo || !matchTarget) chiudiPopup();
        }
      }
    }
 
    // Gestione click sui bottoni filtro tipo
    document.getElementById('filtri-tipo').addEventListener('click', e => {
      const btn = e.target.closest('.filtro-btn');
      if (!btn) return;
      document.querySelectorAll('#filtri-tipo .filtro-btn').forEach(b => b.classList.remove('attivo'));
      btn.classList.add('attivo');
      filtroTipo = btn.dataset.tipo;
      applicaFiltri();
    });
 
    // Gestione click sui bottoni filtro target
    document.getElementById('filtri-target').addEventListener('click', e => {
      const btn = e.target.closest('.filtro-btn');
      if (!btn) return;
      document.querySelectorAll('#filtri-target .filtro-btn').forEach(b => b.classList.remove('attivo'));
      btn.classList.add('attivo');
      filtroTarget = btn.dataset.target;
      applicaFiltri();
    });
 
    // Contatore iniziale
    applicaFiltri();
  </script>
</body>
</html>
